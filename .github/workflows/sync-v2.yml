name: Sync Issues to Hugo Blog

on:
  issues:
    types: [opened, edited, closed, deleted, reopened]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_HUGO: ${{ secrets.PAT_HUGO }}
          SOURCE_REPO: ${{ github.repository }}
          TARGET_REPO: "yingo-server/Never-v2"
          TARGET_DIR: "content/post"
        run: |
          python << 'EOF'
          import os, sys, json, yaml, requests, subprocess, shutil
          from datetime import datetime
          from pathlib import Path

          SOURCE_REPO = os.environ['SOURCE_REPO']
          TARGET_REPO = os.environ['TARGET_REPO']
          TARGET_DIR = os.environ['TARGET_DIR']
          GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
          PAT_HUGO = os.environ['PAT_HUGO']

          API_URL = f"https://api.github.com/repos/{SOURCE_REPO}/issues"
          HEADERS = {"Authorization": f"token {GITHUB_TOKEN}", "Accept": "application/vnd.github.v3+json"}

          def get_all_issues():
              issues = []
              page = 1
              while True:
                  resp = requests.get(API_URL, headers=HEADERS, params={"state": "all", "per_page": 100, "page": page})
                  resp.raise_for_status()
                  data = resp.json()
                  if not data:
                      break
                  for item in data:
                      if "pull_request" not in item:
                          issues.append(item)
                  page += 1
              return issues

          def generate_md(issue):
              title = issue['title']
              body = issue['body'] or ''
              number = issue['number']
              created_at = issue['created_at']
              # 保留所有标签原始大小写（如果需要排除某些标签，请精确匹配）
              tags = [label['name'] for label in issue['labels']]
              # 例如：如果希望排除名为 "exclude" 的标签，可取消注释下行
              # tags = [tag for tag in tags if tag != "exclude"]

              dt = datetime.fromisoformat(created_at.replace('Z', '+00:00'))
              date_str = dt.strftime('%Y-%m-%dT%H:%M:%S+00:00')

              front_matter = {
                  'title': title,
                  'date': date_str,
                  'tags': tags,
                  'draft': False,
              }
              yaml_part = yaml.dump(front_matter, allow_unicode=True, sort_keys=False, default_flow_style=False)
              content = f"---\n{yaml_part}---\n\n{body}"
              filename = dt.strftime('%Y-%m-%d') + f"-issue-{number}.md"
              return filename, content

          print("Fetching all issues...")
          issues = get_all_issues()
          print(f"Found {len(issues)} issues.")

          # 克隆目标仓库
          target_url = f"https://{PAT_HUGO}@github.com/{TARGET_REPO}.git"
          repo_dir = Path("target-repo")
          if repo_dir.exists():
              shutil.rmtree(repo_dir)
          subprocess.run(["git", "clone", target_url, str(repo_dir)], check=True)

          # 清空目标目录
          target_post_dir = repo_dir / TARGET_DIR
          if target_post_dir.exists():
              for f in target_post_dir.glob("*.md"):
                  f.unlink()
          else:
              target_post_dir.mkdir(parents=True, exist_ok=True)

          # 生成所有文章
          for issue in issues:
              filename, content = generate_md(issue)
              filepath = target_post_dir / filename
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"Created {filename}")

          # 提交并推送
          os.chdir(repo_dir)
          subprocess.run(["git", "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"], check=True)
          subprocess.run(["git", "add", TARGET_DIR], check=True)
          result = subprocess.run(["git", "status", "--porcelain"], capture_output=True, text=True)
          if result.stdout.strip():
              subprocess.run(["git", "commit", "-m", f"Sync all issues from {SOURCE_REPO} (full refresh)"], check=True)
              subprocess.run(["git", "push"], check=True)
              print("Pushed changes.")
          else:
              print("No changes to commit.")
          EOF