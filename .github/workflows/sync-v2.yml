name: Sync Issues to Hugo Blog (Page Bundles + EN placeholder)

on:
  issues:
    types: [opened, edited, closed, deleted, reopened]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml requests pypinyin

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_HUGO: ${{ secrets.PAT_HUGO }}
          SOURCE_REPO: ${{ github.repository }}
          TARGET_REPO: "yingo-server/Never-v2"
          TARGET_DIR: "content/post"
        run: |
          python << 'EOF'
          import os, sys, json, yaml, requests, subprocess, shutil, re
          from datetime import datetime
          from pathlib import Path
          from pypinyin import lazy_pinyin

          SOURCE_REPO = os.environ['SOURCE_REPO']
          TARGET_REPO = os.environ['TARGET_REPO']
          TARGET_DIR = os.environ['TARGET_DIR']
          GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
          PAT_HUGO = os.environ['PAT_HUGO']

          API_URL = f"https://api.github.com/repos/{SOURCE_REPO}/issues"
          HEADERS = {"Authorization": f"token {GITHUB_TOKEN}", "Accept": "application/vnd.github.v3+json"}

          def clean_body(text):
              return re.sub(r'[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]', '', text)

          def get_all_issues():
              issues = []
              page = 1
              while True:
                  resp = requests.get(API_URL, headers=HEADERS, params={"state": "all", "per_page": 100, "page": page})
                  resp.raise_for_status()
                  data = resp.json()
                  if not data:
                      break
                  for item in data:
                      if "pull_request" not in item:
                          issues.append(item)
                  page += 1
              return issues

          def generate_index_md(issue, lang='zh'):  # 默认为中文
              title = issue['title']
              body = clean_body(issue['body'] or '')
              number = issue['number']
              created_at = issue['created_at']
              labels = [label['name'] for label in issue['labels']]
              tags = [tag for tag in labels if tag != 'about']

              dt = datetime.fromisoformat(created_at.replace('Z', '+00:00'))
              date_str = dt.strftime('%Y-%m-%dT%H:%M:%S+00:00')

              front_matter = {
                  'title': title,
                  'date': date_str,
                  'tags': tags,
                  'draft': False,
              }
              yaml_str = yaml.dump(front_matter, allow_unicode=True, sort_keys=False, default_flow_style=False)

              if lang == 'zh':
                  content = f"---\n{yaml_str}---\n\n{body}"
              else:  # en
                  title_pinyin = ' '.join(lazy_pinyin(title)).upper()
                  front_matter['title'] = title_pinyin
                  yaml_str = yaml.dump(front_matter, allow_unicode=True, sort_keys=False, default_flow_style=False)
                  en_body = '''
          <div style="text-align: center; margin-top: 20px;">
              <p style="font-size: 2.5em; font-weight: bold;">Sorry, your language is not supported yet.</p>
              <p style="font-size: 0.8em; color: gray;">对不起，您的语言暂未得到支持。</p>
          </div>
                  '''
                  content = f"---\n{yaml_str}---\n\n{en_body}"
              return content

          print("Fetching all issues...")
          issues = get_all_issues()
          print(f"Found {len(issues)} issues.")

          target_url = f"https://{PAT_HUGO}@github.com/{TARGET_REPO}.git"
          repo_dir = Path("target-repo")
          if repo_dir.exists():
              shutil.rmtree(repo_dir)
          subprocess.run(["git", "clone", "--depth=1", target_url, str(repo_dir)], check=True)

          target_post_dir = repo_dir / TARGET_DIR
          if target_post_dir.exists():
              shutil.rmtree(target_post_dir)
          target_post_dir.mkdir(parents=True, exist_ok=True)

          for issue in issues:
              number = issue['number']
              created_at = issue['created_at']
              dt = datetime.fromisoformat(created_at.replace('Z', '+00:00'))
              folder_name = dt.strftime('%Y-%m-%d') + f"-issue-{number}"
              folder_path = target_post_dir / folder_name
              folder_path.mkdir(parents=True, exist_ok=True)

              # 中文版本 index.zh.md（关键修改）
              zh_content = generate_index_md(issue, 'zh')
              with open(folder_path / "index.zh.md", 'w', encoding='utf-8') as f:
                  f.write(zh_content)

              # 英文版本 index.en.md
              en_content = generate_index_md(issue, 'en')
              with open(folder_path / "index.en.md", 'w', encoding='utf-8') as f:
                  f.write(en_content)

              print(f"Created {folder_name}/index.zh.md & index.en.md")

          os.chdir(repo_dir)
          subprocess.run(["git", "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"], check=True)
          subprocess.run(["git", "add", TARGET_DIR], check=True)
          result = subprocess.run(["git", "status", "--porcelain"], capture_output=True, text=True)
          if result.stdout.strip():
              subprocess.run(["git", "commit", "-m", f"Sync all issues from {SOURCE_REPO} (full refresh, Page Bundles) [skip ci]"], check=True)
              subprocess.run(["git", "push"], check=True)
              print("Pushed changes.")
          else:
              print("No changes to commit.")
          EOF
